<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Crowd Runner — Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050510;
      color: #E8E8F0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 16px;
      text-align: center;
    }
    .dots { display: flex; gap: 10px; margin-bottom: 24px; }
    .dot { width: 14px; height: 14px; border-radius: 50%; }
    h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #00F5FF, #FF00E5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .subtitle { color: #8888AA; font-size: 14px; margin-bottom: 6px; }
    .platforms { color: #555570; font-size: 12px; margin-bottom: 40px; letter-spacing: 1px; }
    .links { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 360px; }
    a {
      display: block;
      padding: 16px 24px;
      background: #12122A;
      border: 1px solid #2A2A5A;
      border-radius: 12px;
      color: #E8E8F0;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    a:hover { border-color: #00F5FF; color: #00F5FF; }
    a span { display: block; font-size: 12px; color: #8888AA; font-weight: 400; margin-top: 2px; }
    footer { margin-top: 48px; color: #555570; font-size: 12px; }
  </style>
</head>
<body>
  <div class="dots">
    <div class="dot" style="background:#00F5FF;box-shadow:0 0 10px #00F5FF;"></div>
    <div class="dot" style="background:#FF00E5;box-shadow:0 0 10px #FF00E5;"></div>
    <div class="dot" style="background:#FFE600;box-shadow:0 0 10px #FFE600;"></div>
  </div>
  <h1>Neon Crowd Runner</h1>
  <p class="subtitle">Legal Documents</p>
  <p class="platforms">iOS &amp; Android</p>
  <div class="links">
    <a href="support.html">
      Support
      <span>FAQs &amp; contact us</span>
    </a>
    <a href="privacy-policy.html">
      Privacy Policy
      <span>How we handle your data</span>
    </a>
    <a href="terms-and-conditions.html">
      Terms &amp; Conditions
      <span>Rules of use and in-app purchases</span>
    </a>
  </div>
  <footer>&copy; 2026 Shayona. All rights reserved.</footer>
</body>
</html>
